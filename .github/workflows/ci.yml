name: gbcemu

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libgdk-pixbuf2.0-dev libglib2.0-dev libgtk-3-dev libpango1.0-dev libxdo-dev

      - name: Install test dependencies
        run: bash scripts/install_test_dependencies.sh

      - name: Run tests
        run: cargo test